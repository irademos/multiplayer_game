<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minimalist 3D Multiplayer Movement</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
  <div id="game-container">
    <div class="crosshair"></div>
  </div>
  <div id="interaction-tooltip" class="interaction-tooltip"></div>
  <div id="health-bar"><div id="health-fill"></div></div>
  <div id="action-buttons">
    <button id="mobile-action-toggle" class="action-button mobile-only" aria-expanded="false" aria-label="Toggle actions">⋯</button>
    <button id="voice-button" class="action-button mobile-action">Unmute</button>
    <button id="roll-button" class="action-button mobile-action">ROLL</button>
  </div>
  
  <!-- Settings Button -->
  <div id="settings-button">⚙️</div>

  <!-- Settings Overlay -->
  <div id="settings-overlay">
    <div id="settings-panel">
      <label for="name-input">Name:</label>
      <input type="text" id="name-input" />
      <label for="character-select">Character:</label>
      <select id="character-select"></select>
      <button id="save-settings">Save</button>

      <button id="toggle-console">Show Console</button>

      <div id="console-log" style="display: none; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 10px;"></div>

      <hr />

      <div id="settings-tabs">
        <button class="tab-btn active" data-tab="multiplayer">Multiplayer</button>
        <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
      </div>

      <div id="tab-multiplayer" class="tab-content">
        <h3>Connected Players</h3>
        <ul id="connected-players-list"></ul>

        <h3>Connection Issues</h3>
        <ul id="connection-errors-list"></ul>

        <h3>Ping (ms)</h3>
        <div id="ping-display">-</div>
      </div>

      <div id="tab-leaderboard" class="tab-content" style="display:none">
        <h3>Leaderboard</h3>
        <div id="leaderboard-list"><em>Loading...</em></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       ARCADE LOGIN OVERLAY
  ════════════════════════════════════════════════ -->
  <div id="login-overlay" class="arcade-overlay">

    <!-- ── Welcome Back screen ── -->
    <div id="screen-welcome" class="arcade-panel hidden">
      <div class="arcade-title">GOAL QUEST</div>
      <div class="arcade-subtitle">WELCOME BACK,<br><span id="welcome-name"></span></div>
      <button class="arcade-btn arcade-btn-green" id="btn-start-game">▶ START GAME</button>
      <button class="arcade-btn arcade-btn-dim" id="btn-not-you">NOT YOU? GO BACK</button>
    </div>

    <!-- ── Login screen (shown by default) ── -->
    <div id="screen-login" class="arcade-panel">
      <div class="arcade-title">GOAL QUEST</div>
      <div class="arcade-subtitle blink-slow">INSERT COIN</div>

      <div class="arcade-field">
        <label class="arcade-label">PLAYER NAME</label>
        <input class="arcade-input" id="login-name" type="text" maxlength="20" autocomplete="username" placeholder="ENTER NAME" spellcheck="false" />
      </div>

      <div class="arcade-field">
        <label class="arcade-label">PIN (4-6 DIGITS)</label>
        <div class="pin-row">
          <input class="arcade-input pin-real" id="login-pin" type="tel" inputmode="numeric" maxlength="6" autocomplete="current-password" placeholder="" />
          <div class="pin-display" id="login-pin-display">○○○○○○</div>
        </div>
      </div>

      <div class="arcade-error hidden" id="login-error"></div>

      <div class="arcade-btn-row">
        <button class="arcade-btn arcade-btn-yellow" id="btn-login">LOGIN</button>
        <button class="arcade-btn arcade-btn-red" id="btn-go-signup">SIGN UP</button>
      </div>
    </div>

    <!-- ── Sign-up screen ── -->
    <div id="screen-signup" class="arcade-panel hidden">
      <div class="arcade-title">NEW PLAYER</div>

      <div class="arcade-field">
        <label class="arcade-label">PLAYER NAME</label>
        <input class="arcade-input" id="signup-name" type="text" maxlength="20" autocomplete="username" placeholder="CHOOSE A NAME" spellcheck="false" />
      </div>

      <div class="arcade-field">
        <label class="arcade-label">SET PIN (4-6 DIGITS)</label>
        <div class="pin-row">
          <input class="arcade-input pin-real" id="signup-pin" type="tel" inputmode="numeric" maxlength="6" autocomplete="new-password" placeholder="" />
          <div class="pin-display" id="signup-pin-display">○○○○○○</div>
        </div>
      </div>

      <div class="arcade-field">
        <label class="arcade-label">RE-ENTER PIN</label>
        <div class="pin-row">
          <input class="arcade-input pin-real" id="signup-pin2" type="tel" inputmode="numeric" maxlength="6" autocomplete="new-password" placeholder="" />
          <div class="pin-display" id="signup-pin2-display">○○○○○○</div>
        </div>
      </div>

      <div class="arcade-error hidden" id="signup-error"></div>

      <div class="arcade-btn-row">
        <button class="arcade-btn arcade-btn-green" id="btn-signup">SIGN UP</button>
        <button class="arcade-btn arcade-btn-dim" id="btn-back-to-login">◀ BACK</button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════
       GAME OVER OVERLAY
  ════════════════════════════════════════════════ -->
  <!-- Game Over Overlay -->
  <div id="game-over-overlay" class="hidden">
    <div id="game-over-message">GAME OVER</div>
    <div id="continue-section" class="hidden">
      <div>CONTINUE?</div>
      <div id="countdown">9</div>
      <div>
        <span id="continue-yes" class="continue-option">YES</span>
        <span id="continue-no" class="continue-option">NO</span>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
